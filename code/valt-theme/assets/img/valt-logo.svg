<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Outer vault ring -->
  <circle cx="100" cy="100" r="82" stroke="#E8C48B" stroke-width="6" fill="none"/>
  <!-- Inner concentric rings (vault door feel) -->
  <circle cx="100" cy="100" r="64" stroke="#E8C48B" stroke-width="1" opacity="0.12" fill="none"/>
  <circle cx="100" cy="100" r="46" stroke="#E8C48B" stroke-width="1" opacity="0.08" fill="none"/>

  <!-- Three asymmetric spokes — vault handle / triskelion
       Flipped: main spoke points DOWN (6 o'clock)
       Arms at unequal angles for distinctiveness -->

  <!-- Spoke 1: Down (6 o'clock) — longest, the handle -->
  <line x1="100" y1="100" x2="100" y2="186" stroke="url(#vg)" stroke-width="6" stroke-linecap="round"/>

  <!-- Spoke 2: Upper-left (~10 o'clock, 150°) -->
  <line x1="100" y1="100" x2="26" y2="56" stroke="url(#vg)" stroke-width="6" stroke-linecap="round"/>

  <!-- Spoke 3: Upper-right (~2 o'clock, 30°) — slightly different angle than spoke 2 -->
  <line x1="100" y1="100" x2="178" y2="42" stroke="url(#vg)" stroke-width="6" stroke-linecap="round"/>

  <!-- Spoke end nodes — different sizes for visual interest -->
  <circle cx="100" cy="186" r="8" fill="#E8C48B"/>
  <circle cx="26" cy="56" r="6" fill="#C9A66B"/>
  <circle cx="178" cy="42" r="6" fill="#C9A66B"/>

  <!-- Center hub -->
  <circle cx="100" cy="100" r="7" fill="#3D3C56" stroke="#E8C48B" stroke-width="3"/>

  <defs>
    <linearGradient id="vg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F2D9A9"/>
      <stop offset="100%" stop-color="#C9A66B"/>
    </linearGradient>
  </defs>
</svg>
